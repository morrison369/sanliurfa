apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanliurfa-app
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sanliurfa
  template:
    metadata:
      labels:
        app: sanliurfa
    spec:
      containers:
      - name: app
        image: sanliurfa/app:latest
        ports:
        - containerPort: 4321
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4321
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sanliurfa-service
spec:
  selector:
    app: sanliurfa
  ports:
  - port: 80
    targetPort: 4321
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sanliurfa-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sanliurfa-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
