[SERVICE]
    Flush        1
    Log_Level    info
    Daemon       off
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name              tail
    Tag               app.logs
    Path              /var/log/app/*.log
    Parser            json
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /tmp/fluent-bit-tail.db

[INPUT]
    Name              tail
    Tag               nginx.access
    Path              /var/log/nginx/access.log
    Parser            nginx
    Refresh_Interval  5

[INPUT]
    Name              tail
    Tag               nginx.error
    Path              /var/log/nginx/error.log
    Parser            nginx_error
    Refresh_Interval  5

[FILTER]
    Name   grep
    Match  app.logs
    Regex  level (error|warn)

[FILTER]
    Name    modify
    Match   app.logs
    Add     environment ${ENVIRONMENT}
    Add     service sanliurfa-app

[FILTER]
    Name   parser
    Match  app.logs
    Key_Name log
    Parser json
    Reserve_Data On

[OUTPUT]
    Name   loki
    Match  app.logs
    Host   loki
    Port   3100
    Labels job=app,environment=${ENVIRONMENT}
    Line_Format json
    Drop_Records_With_Empty_Values On

[OUTPUT]
    Name   stdout
    Match  app.logs
    Format json

[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

[PARSER]
    Name        nginx
    Format      regex
    Regex       ^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
    Time_Key    time
    Time_Format %d/%b/%Y:%H:%M:%S %z

[PARSER]
    Name        nginx_error
    Format      regex
    Regex       ^(?<time>[^ ]+ [^ ]+) \[(?<level>[^\]]+)\] (?<pid>\d+)#(?<tid>\d+): (\*\d+ )?(?<message>.*)$
    Time_Key    time
    Time_Format %Y/%m/%d %H:%M:%S
