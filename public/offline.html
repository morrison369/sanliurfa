<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çevrimdışı - Şanlıurfa Rehberi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 28px;
      color: #1a202c;
      margin-bottom: 12px;
    }
    
    p {
      color: #4a5568;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    button {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #D97706;
      color: white;
    }
    
    .btn-primary:hover {
      background: #B45309;
    }
    
    .btn-secondary {
      background: white;
      color: #4a5568;
      border: 2px solid #e2e8f0;
    }
    
    .btn-secondary:hover {
      border-color: #D97706;
      color: #D97706;
    }
    
    .cached-content {
      margin-top: 32px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .cached-content h2 {
      font-size: 18px;
      color: #1a202c;
      margin-bottom: 12px;
    }
    
    .cached-list {
      list-style: none;
    }
    
    .cached-list li {
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .cached-list li:last-child {
      border-bottom: none;
    }
    
    .cached-list a {
      color: #D97706;
      text-decoration: none;
    }
    
    .cached-list a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Çevrimdışı Mod</h1>
    <p>İnternet bağlantınızı kontrol edin. Daha önce ziyaret ettiğiniz bazı sayfaları çevrimdışı görüntüleyebilirsiniz.</p>
    
    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">
        🔄 Tekrar Dene
      </button>
      <button class="btn-secondary" onclick="history.back()">
        ← Geri Dön
      </button>
    </div>
    
    <div class="cached-content">
      <h2>📱 Önbellekteki Sayfalar</h2>
      <ul class="cached-list">
        <li><a href="/">🏠 Ana Sayfa</a></li>
        <li><a href="/mekanlar">📍 Mekanlar</a></li>
        <li><a href="/harita">🗺️ Harita</a></li>
        <li><a href="/blog">📝 Blog</a></li>
        <li><a href="/tarihi-yerler">🏛️ Tarihi Yerler</a></li>
        <li><a href="/mekanlar/yoresel-yemekler">🍽️ Yöresel Yemekler</a></li>
      </ul>
    </div>
  </div>
  
  <script>
    // Check connection status
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
