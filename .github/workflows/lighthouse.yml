name: Lighthouse CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
  workflow_dispatch:
  schedule:
    # Haftalık baseline (her Pazartesi 04:00 UTC)
    - cron: '0 4 * * 1'

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts

      - name: Lighthouse CI on production
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun --config=.lighthouserc.json || echo "Lighthouse completed with warnings"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 30

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.lighthouseci/manifest.json';
            if (!fs.existsSync(path)) {
              core.warning('No Lighthouse manifest found.');
              return;
            }
            const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
            const summary = manifest.map(r => ({
              url: r.url,
              perf: Math.round((r.summary?.performance || 0) * 100),
              a11y: Math.round((r.summary?.accessibility || 0) * 100),
              best: Math.round((r.summary?.['best-practices'] || 0) * 100),
              seo: Math.round((r.summary?.seo || 0) * 100),
            }));
            const body = [
              '## 🚦 Lighthouse Audit',
              '',
              '| URL | Perf | A11y | Best Practices | SEO |',
              '|---|---|---|---|---|',
              ...summary.map(s => `| ${s.url} | ${s.perf} | ${s.a11y} | ${s.best} | ${s.seo} |`),
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
