name: Code Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dead-code-check:
    name: 🔍 Dead Code Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run ts-prune
        run: npx ts-prune --project tsconfig.json --error
        continue-on-error: true
      
      - name: Check unimported files
        run: npx unimported --flow=stdout
        continue-on-error: true

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  circular-dependency-check:
    name: 🔄 Circular Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Check circular dependencies
        run: npx madge --circular --extensions ts src/lib/index.ts

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  bundle-size-check:
    name: 📦 Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build
        run: npm run build

      - name: Runtime single-process gate
        run: npm run runtime:single-process:gate
      
      - name: Check bundle size
        run: npx bundlesize
        continue-on-error: true

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  dependency-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  lint-and-type-check:
    name: 🧹 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Lint
        run: npm run lint:ci
      
      - name: Type check
        run: npx tsc --noEmit --incremental

      - name: Env gate (no dynamic import.meta.env)
        run: npm run env:gate

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan
