name: Workflow Standards

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - 'scripts/ci/workflow-standards-*.mjs'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - 'scripts/ci/workflow-standards-*.mjs'
      - 'package.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  standards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Append workflow standards summary
        shell: bash
        run: |
          echo "## Workflow Standards" >> "$GITHUB_STEP_SUMMARY"
          cat docs/workflow-standards-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan
