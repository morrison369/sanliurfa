name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Secret scan
        run: npm run security:scan-secrets

      - name: Public readiness gate
        run: npm run security:public-readiness
        continue-on-error: true

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
