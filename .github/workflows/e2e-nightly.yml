name: E2E Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  api-smoke-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Validate schema readiness
        run: npm run smoke:schema:ready
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Transit metadata refresh job
        run: npm run jobs:transit:refresh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Weather metadata refresh job
        run: npm run jobs:weather:refresh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Transport freshness smoke
        run: npm run smoke:transport:freshness
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: DB backup/restore smoke
        run: npm run smoke:db:backup-restore
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Run API release gate
        run: npm run api:release:gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379

      - name: Generate readiness report
        if: always()
        run: npm run release:readiness:report

      - name: Generate runtime health report
        if: always()
        run: npm run dev:isolated:health:report

      - name: Upload API nightly artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-nightly-report
          path: |
            docs/release-readiness.json
            docs/release-readiness.md
            docs/openapi-p0-closure-report.json
            docs/openapi-p0-closure-report.md
            docs/runtime-health-report.json
            docs/runtime-health-report.md

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  e2e-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Validate schema readiness
        run: npm run smoke:schema:ready
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Transit metadata refresh job
        run: npm run jobs:transit:refresh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Weather metadata refresh job
        run: npm run jobs:weather:refresh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Transport freshness smoke
        run: npm run smoke:transport:freshness
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: DB backup/restore smoke
        run: npm run smoke:db:backup-restore
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run social phase1 E2E gate
        run: npm run test:e2e:social:phase1:clean
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379
          E2E_SEED: 20260418

      - name: Run admin site content live reflect contract
        run: node scripts/runtime/run-with-cleanup.mjs "npx playwright test --config=playwright.config.ts e2e/admin-site-content-live.spec.ts --project=chromium"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379
          E2E_SEED: 20260418
          E2E_ADMIN_BYPASS: 1

      - name: Run full E2E matrix
        run: npm run test:e2e:clean
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379
          E2E_SEED: 20260418

      - name: Run critical page/image smoke
        run: |
          npm run smoke:pages:critical
          npm run smoke:images:critical
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379

      - name: Run critical API smoke
        run: npm run smoke:api:critical
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379

      - name: Generate readiness report
        if: always()
        run: npm run release:readiness:report

      - name: Generate runtime health report
        if: always()
        run: npm run dev:isolated:health:report

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-nightly-report
          path: playwright-report/

      - name: Upload readiness report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-readiness-nightly
          path: |
            docs/release-readiness.json
            docs/release-readiness.md
            docs/runtime-health-report.json
            docs/runtime-health-report.md

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan
