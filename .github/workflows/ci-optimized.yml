name: Optimized CI/CD

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  CACHE_KEY: ${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  # Install dependencies once and cache
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY }}-node_modules

  # Lint and type check
  lint:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY }}-node_modules
      
      - name: Run Astro check
        run: npm run lint 2>&1 | tee lint.log
        continue-on-error: true

      - name: Type check (advisory)
        run: npm run type-check 2>&1 | tee type-check.log
        continue-on-error: true

      - name: Env gate (no dynamic import.meta.env)
        run: npm run env:gate

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Append workflow standards summary
        shell: bash
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Workflow Standards" >> "$GITHUB_STEP_SUMMARY"
          cat docs/workflow-standards-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Migration duplicate check (advisory)
        run: npm run db:migrate:check-duplicates
        continue-on-error: true

      - name: Lint changed files (PR gate)
        if: github.event_name == 'pull_request'
        run: npm run lint:changed

      - name: Upload lint/type logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-type-logs
          path: |
            lint.log
            type-check.log

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

  # Build application
  build:
    needs: [install, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY }}-node_modules
      
      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          SITE_URL: https://sanliurfa.com

      - name: Runtime single-process gate
        run: npm run runtime:single-process:gate
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 1

  # Run unit tests with database
  test-unit:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY }}-node_modules
      
      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: API release gate
        shell: bash
        run: |
          npm run api:release:gate 2>&1 | tee api-release-gate.log
          echo "## API Release Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- workflow: Optimized CI/CD" >> "$GITHUB_STEP_SUMMARY"
          echo "- command: npm run api:release:gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: success" >> "$GITHUB_STEP_SUMMARY"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379

      - name: Upload API gate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-release-gate-report
          path: api-release-gate.log

      - name: Download lint/type logs
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: lint-type-logs
          path: .

      - name: Collect quality metrics
        if: always()
        shell: bash
        run: |
          npm run quality:metrics:ci | tee quality-metrics-summary.log
          npm run warning:debt:summary
          cat quality-metrics-summary.log >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-metrics
          path: |
            quality-metrics.json
            quality-metrics-summary.log
            docs/warning-debt-summary.json
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan

  # Security audit
  security:
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ env.CACHE_KEY }}-node_modules
      
      - name: Run security audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Scan for leaked secrets
        run: npm run security:scan-secrets
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  # Bundle size check
  bundle-size:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      
      - name: Check bundle size
        run: |
          echo "Bundle size analysis:"
          du -sh dist/
          du -sh dist/client/
          du -sh dist/server/
          echo "Largest files:"
          find dist/client -type f -exec du -h {} + | sort -rh | head -20

  # Deploy to staging
  deploy-staging:
    needs: [test-unit, security, bundle-size]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Add your staging deployment commands here
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}

  # Deploy to production
  deploy-production:
    needs: [test-unit, security, bundle-size]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your production deployment commands here
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
