name: Public City Gate

on:
  push:
    branches: [master, main, develop]
    paths:
      - "src/pages/**"
      - "src/lib/**"
      - "src/components/**"
      - "src/layouts/**"
      - "public/images/**"
      - "scripts/ci/**"
      - "scripts/smoke/**"
      - "docs/MVP_PUBLIC_ACCEPTANCE.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/public-city-gate.yml"
  pull_request:
    branches: [master, main, develop]
    paths:
      - "src/pages/**"
      - "src/lib/**"
      - "src/components/**"
      - "src/layouts/**"
      - "public/images/**"
      - "scripts/ci/**"
      - "scripts/smoke/**"
      - "docs/MVP_PUBLIC_ACCEPTANCE.md"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/public-city-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  public-city-gate:
    name: Public City Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
      REDIS_URL: redis://localhost:6379
      SITE_URL: https://sanliurfa.com
      CORS_ORIGINS: https://sanliurfa.com
      JWT_SECRET: public-city-gate-local-only-secret-key-32
      SESSION_SECRET: public-city-gate-local-only-session-key-32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: Public city gate with build
        run: npm run public:city:gate:build

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan
