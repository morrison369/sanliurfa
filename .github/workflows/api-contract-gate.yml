name: API Contract Gate

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/pages/api/**'
      - 'src/lib/__tests__/openapi-*.test.ts'
      - 'src/lib/__tests__/places-*-api.test.ts'
      - 'src/lib/__tests__/places-list-cache-api.test.ts'
      - 'scripts/openapi/**'
      - 'scripts/smoke/**'
      - 'docs/openapi-route-gap-baseline.json'
      - 'package.json'
      - '.github/workflows/api-contract-gate.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/ci-optimized.yml'
  push:
    branches: [main, develop]
    paths:
      - 'src/pages/api/**'
      - 'src/lib/__tests__/openapi-*.test.ts'
      - 'src/lib/__tests__/places-*-api.test.ts'
      - 'src/lib/__tests__/places-list-cache-api.test.ts'
      - 'scripts/openapi/**'
      - 'scripts/smoke/**'
      - 'docs/openapi-route-gap-baseline.json'
      - 'package.json'
      - '.github/workflows/api-contract-gate.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/ci-optimized.yml'

env:
  NODE_VERSION: '22'

concurrency:
  group: api-contract-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  api-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sanliurfa_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Workflow standards verify
        run: npm run workflow:standards:verify

      - name: API release gate
        shell: bash
        run: |
          npm run api:release:gate 2>&1 | tee api-release-gate.log
          echo "## API Release Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- workflow: API Contract Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- command: npm run api:release:gate" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: success" >> "$GITHUB_STEP_SUMMARY"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sanliurfa_test
          REDIS_URL: redis://localhost:6379

      - name: Upload API gate report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-release-gate-report
          path: api-release-gate.log

      - name: Build OpenAPI gap summary
        if: always()
        shell: bash
        run: |
          npm run openapi:gap:summary > openapi-gap-summary.txt
          {
            echo "## OpenAPI Gap Snapshot"
            echo ""
            echo "Generated by \`npm run openapi:gap:summary\`."
            echo ""
            echo '```text'
            cat openapi-gap-summary.txt
            echo '```'
          } > openapi-gap-summary.md

      - name: Upload OpenAPI gap summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-gap-summary
          path: |
            openapi-gap-summary.txt
            openapi-gap-summary.md

      - name: Upload workflow standards report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-standards-report-${{ github.job }}
          path: |
            docs/workflow-standards-report.json
            docs/workflow-standards-report.md

      - name: Comment OpenAPI gap on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openapi-gap-summary
          path: openapi-gap-summary.md

      - name: Ensure no orphan dev process
        if: always()
        run: npm run dev:isolated:check-no-orphan
