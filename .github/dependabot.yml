version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    target-branch: master
    labels:
      - dependencies
      - security
    groups:
      astro-runtime:
        patterns:
          - astro
          - "@astrojs/*"
      react-ui:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      test-tooling:
        patterns:
          - vitest
          - "@vitest/*"
          - "@playwright/*"
